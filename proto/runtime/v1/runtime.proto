syntax = "proto3";

package edgevision.runtime.v1;

option go_package = "edgevision/contracts/gen/runtime/v1;runtimev1";

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";

service SupervisorService {
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);
  rpc ApplyDeployment(ApplyDeploymentRequest) returns (ApplyDeploymentResponse);
  rpc StopDeployment(StopDeploymentRequest) returns (StopDeploymentResponse);
  rpc GetSupervisorStatus(GetSupervisorStatusRequest) returns (GetSupervisorStatusResponse);
  rpc GetDeploymentStatus(GetDeploymentStatusRequest) returns (GetDeploymentStatusResponse);
}

message RuntimeCapability {
  string node_id = 1;
  string runtime_version = 2;
  repeated edgevision.common.v1.ExecutionMode supported_execution_modes = 3;
  repeated edgevision.common.v1.ExecutionBackend supported_execution_backends = 4;
  uint32 max_source_bindings = 5;
  uint32 max_algorithm_bindings = 6;
  bool supports_event_stream = 7;
  map<string, string> labels = 8;
}

message HandshakeRequest {
  edgevision.common.v1.RequestMeta meta = 1;
  string control_plane_id = 2;
  string node_id = 3;
  string protocol_version = 4;
  edgevision.common.v1.ExecutionMode desired_execution_mode = 5;
  edgevision.common.v1.ExecutionBackend desired_execution_backend = 6;
}

message HandshakeResponse {
  bool accepted = 1;
  string session_id = 2;
  string protocol_version = 3;
  RuntimeCapability capability = 4;
  string message = 5;
}

message RuntimeSourceBinding {
  string binding_id = 1;
  edgevision.common.v1.ResourceRef input_binding = 2;
  map<string, string> labels = 3;
}

message RuntimeAlgorithmBinding {
  string binding_id = 1;
  edgevision.common.v1.ResourceRef algorithm = 2;
  edgevision.common.v1.ResourceRef artifact = 3;
  edgevision.common.v1.ResourceRef config_revision = 4;
  edgevision.common.v1.ExecutionMode execution_mode = 5;
  edgevision.common.v1.ExecutionBackend execution_backend = 6;
  repeated string input_binding_ids = 7;
  map<string, string> parameters = 8;
}

message RuntimeOutputBinding {
  string binding_id = 1;
  string kind = 2;
  edgevision.common.v1.ResourceRef sink = 3;
  map<string, string> options = 4;
}

message RuntimeExecutionPolicy {
  bool report_runtime_events = 1;
  uint32 event_batch_size = 2;
  uint32 max_events_per_second = 3;
  map<string, string> options = 4;
}

// ExecutionRequest is the explicit, declarative request sent by the backend
// to runtime. It is not compiled C++/model code and is not runtime's internal
// graph representation. Runtime owns validation, normalization, model loading,
// and binding each algorithm node to the effective execution backend.
message ExecutionRequest {
  string execution_request_id = 1;
  edgevision.common.v1.ExecutionMode execution_mode = 2;
  edgevision.common.v1.ExecutionBackend execution_backend = 3;
  repeated RuntimeSourceBinding sources = 4;
  repeated RuntimeAlgorithmBinding algorithms = 5;
  repeated RuntimeOutputBinding outputs = 6;
  RuntimeExecutionPolicy policy = 7;
  edgevision.common.v1.ResourceRef runtime_config = 8;
}

message WorkloadSpec {
  string deployment_id = 1;
  string node_id = 2;
  edgevision.common.v1.ResourceRef artifact = 3;
  edgevision.common.v1.ResourceRef config_revision = 4;
  edgevision.common.v1.ResourceRef input_binding = 5;
  edgevision.common.v1.ExecutionBackend preferred_backend = 6 [deprecated = true];
  edgevision.common.v1.ExecutionMode execution_mode = 7;
  edgevision.common.v1.ExecutionBackend execution_backend = 8;
  ExecutionRequest execution = 9;
}

// ApplyDeployment applies an algorithm deployment intent to a runtime node.
// The deployment is about binding cameras/inputs, algorithm artifacts/config,
// and runtime policy to a node. It is not an infrastructure deployment.
message ApplyDeploymentRequest {
  edgevision.common.v1.RequestMeta meta = 1;
  WorkloadSpec spec = 2;
}

message ApplyDeploymentResponse {
  bool accepted = 1;
  string operation_id = 2;
}

message StopDeploymentRequest {
  edgevision.common.v1.RequestMeta meta = 1;
  string deployment_id = 2;
  string node_id = 3;
}

message StopDeploymentResponse {
  bool accepted = 1;
  string operation_id = 2;
}

message GetSupervisorStatusRequest {
  string node_id = 1;
}

message GetSupervisorStatusResponse {
  SupervisorStatus status = 1;
}

message GetDeploymentStatusRequest {
  string deployment_id = 1;
  string node_id = 2;
}

message GetDeploymentStatusResponse {
  DeploymentStatus status = 1;
}

message SupervisorStatus {
  string node_id = 1;
  string supervisor_version = 2;
  edgevision.common.v1.LifecycleState state = 3;
  edgevision.common.v1.HealthState health = 4;
  edgevision.common.v1.ExecutionBackend default_backend = 5 [deprecated = true];
  uint32 active_deployment_count = 6;
  edgevision.common.v1.StatusSnapshotMeta snapshot = 7;
  edgevision.common.v1.ExecutionMode default_execution_mode = 8;
  edgevision.common.v1.ExecutionBackend default_execution_backend = 9;
}

message DeploymentStatus {
  string deployment_id = 1;
  string node_id = 2;
  string runtime_instance_id = 3;
  edgevision.common.v1.LifecycleState state = 4;
  edgevision.common.v1.HealthState health = 5;
  string status_message = 6;
  edgevision.common.v1.StatusSnapshotMeta snapshot = 7;
  edgevision.common.v1.ExecutionMode effective_execution_mode = 8;
  edgevision.common.v1.ExecutionBackend effective_execution_backend = 9;
}

message RuntimeEvent {
  string event_id = 1;
  string deployment_id = 2;
  string node_id = 3;
  string runtime_instance_id = 4;
  string source_binding_id = 5;
  string algorithm_binding_id = 6;
  string event_type = 7;
  edgevision.common.v1.EventSeverity severity = 8;
  string message = 9;
  google.protobuf.Timestamp occurred_at = 10;
  uint64 sequence = 11;
  map<string, string> attributes = 12;
  repeated edgevision.common.v1.ResourceRef evidence = 13;
}
